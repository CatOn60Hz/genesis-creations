<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Genesis Creations — Chennai media house: Media Academy, Digital Marketing, Production, Studio Rental and Broadcasting."
    />
    <!-- Fonts: preconnect for an early handshake, then load the stylesheet
         asynchronously (media=print flips to all onload) so it never blocks the
         initial render. display:swap means text paints immediately in a fallback
         and swaps in when the webfont arrives. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      />
    </noscript>
    <title>Genesis Creations — Chennai Media House</title>
    <!-- Static app-shell splash. It paints instantly from HTML+inline CSS (no
         JS, no webfont needed), giving a fast First Contentful Paint on the
         otherwise-empty SPA shell, then fades out once React has rendered (see
         main.tsx). System font so it never waits on the webfont. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f6e8ec 0%, #eeeeee 45%, #e4e4e7 100%);
        transition: opacity 0.25s ease;
        font-family: "Space Grotesk", "Outfit", system-ui, -apple-system, sans-serif;
      }
      #app-splash.gc-hide {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .gc-brand {
        margin: 0;
        padding: 0 1rem;
        max-width: 14ch;
        text-align: center;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        line-height: 0.95;
        color: #2a0d15;
        font-size: clamp(2.75rem, 12vw, 7rem);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash"><h1 class="gc-brand">Genesis Creations</h1></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
