<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Genesis Kreations — Chennai media house: Media Academy, Digital Marketing, Production, Studio Rental and Broadcasting."
    />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://genesiskreationsmedia.com/" />
    <meta property="og:title" content="Genesis Kreations — Chennai Media House" />
    <meta property="og:description" content="Genesis Kreations — Chennai media house: Media Academy, Digital Marketing, Production, Studio Rental and Broadcasting." />
    <meta property="og:image" content="https://genesiskreationsmedia.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Genesis Kreations — Chennai Media House" />
    <meta property="og:site_name" content="Genesis Kreations" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://genesiskreationsmedia.com/" />
    <meta property="twitter:title" content="Genesis Kreations — Chennai Media House" />
    <meta property="twitter:description" content="Genesis Kreations — Chennai media house: Media Academy, Digital Marketing, Production, Studio Rental and Broadcasting." />
    <meta property="twitter:image" content="https://genesiskreationsmedia.com/og-image.jpg" />

    <!-- Organization / LocalBusiness structured data. Kept static here (not
         injected by React) so it's present in the served HTML for crawlers and
         AI agents that don't execute JavaScript. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Genesis Kreations",
      "description": "Chennai media house offering a media academy, digital marketing, video/film production, studio rental and broadcasting.",
      "url": "https://genesiskreationsmedia.com/",
      "logo": "https://genesiskreationsmedia.com/favicon.png",
      "image": "https://genesiskreationsmedia.com/og-image.jpg",
      "telephone": "+91-78248-50999",
      "email": "info@genesiskreationsmedia.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "#340B/1A3B1, Vinayaka Avenue, Okkiyam Thoraipakkam",
        "addressLocality": "Chennai",
        "addressRegion": "Tamil Nadu",
        "postalCode": "600097",
        "addressCountry": "IN"
      },
      "areaServed": "Chennai"
    }
    </script>

    <!-- Fonts: preconnect for an early handshake, then load the stylesheet
         asynchronously (media=print flips to all onload) so it never blocks the
         initial render. display:swap means text paints immediately in a fallback
         and swaps in when the webfont arrives. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      />
    </noscript>
    <title>Genesis Kreations — Chennai Media House</title>
    <!-- Static app-shell splash. It paints instantly from HTML+inline CSS (no
         JS, no webfont needed), giving a fast First Contentful Paint on the
         otherwise-empty SPA shell, then fades out once React has rendered (see
         main.tsx). System font so it never waits on the webfont. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f6e8ec 0%, #eeeeee 45%, #e4e4e7 100%);
        transition: opacity 0.25s ease;
        font-family: "Space Grotesk", "Outfit", system-ui, -apple-system, sans-serif;
      }
      #app-splash.gc-hide {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .gc-brand {
        margin: 0;
        padding: 0 1rem;
        max-width: 14ch;
        text-align: center;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        line-height: 0.95;
        color: #2a0d15;
        font-size: clamp(2.75rem, 12vw, 7rem);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Decorative loading screen: aria-hidden so it never enters the
         accessibility tree, and a plain <p> (not an <h1>) so it doesn't pollute
         the heading outline or duplicate the real <h1> React renders. -->
    <div id="app-splash" aria-hidden="true" role="presentation">
      <p class="gc-brand">Genesis Kreations</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
