; Raise PHP upload limits so the admin can upload large images.
; Hostinger runs PHP-FPM, which reads this file (web root applies to /api too).
; Keep post_max_size comfortably above upload_max_filesize to allow several
; files in one upload batch. Changes can take a few minutes to apply (FPM caches
; .user.ini for ~5 min). If it still caps low, also set these in hPanel's PHP
; configuration, which can override.
upload_max_filesize = 50M
post_max_size = 220M
memory_limit = 256M
max_execution_time = 180
max_input_time = 180
